<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム勉強部屋 - 暗記の小屋</title>
    <meta name="title" content="みんなの問題集">
    <link rel="stylesheet" href="assets/css/study-room.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="16x16 32x32 48x48">
    <link rel="icon" type="image/png" href="/favicon-512x512.png" sizes="512x512">
    <meta name="google-site-verification" content="DvfNFjAlVr4_8kpecRR6ogaB1fDBn8mpAIOWpMKggLE" />
    <meta name="description" content="リアルタイムで見ず知らずの誰かと共に勉強することができます。">

    <script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: []
        },
        options: {
            enableMenu: false
        }

    <script id="MathJax-script" async
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "暗記の小屋",
        "operatingSystem": "WEB",
        "applicationCategory": "EducationApplication",
        "url": "https://lit-kei.github.io/study/study-room.html",
        "description": "リアルタイムで見ず知らずの誰かと共に勉強することができます。",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "JPY",
            "availability": "https://schema.org/InStock"
        }
    }
    </script>
    <script async src="assets/js/style.js"></script>
</head>

<body>
    <header></header>
    <div class="main-content" style="min-height: 100vh;">
        <main>
            <div class="title-wrapper">

            <h1 class="title">リアルタイム勉強部屋へようこそ！</h1>

            <button id="settingsBtn" class="settings-btn" aria-label="設定">
                <img src="assets/images/setting.svg" alt="設定のアイコン" class="image" height="30px" width="30px">
            </button>
            </div>
            <div class="container" id="container">


                <canvas width="1000" height="800" id="canvas">

                </canvas>
            </div>
            
        </main>
    </div>
    <div id="nameModal" class="modal hidden">
    <div class="modal-backdrop"></div>

    <div class="modal-content">
        <div id="modalMain" class="modal-main">
            <h2>名前を入力してください（任意）</h2>
            <input
            id="nameInput"
            type="text"
            placeholder="例：Kei"
            autocomplete="off"
            />
            <p id="nameCount">0 / <strong>12</strong></p>
            <p id="nameError"></p>
            <div class="modal-buttons">
            <button id="nameCancel" class="btn red small">cancel</button>
            <button id="nameConfirm" class="btn green small">OK</button>
            </div>
        </div>
        <div class="spinner" id="spinner"></div>

    </div>
    </div>

    <!-- 終了確認モーダル -->
    <div id="endModal" class="modal hidden">
    <div class="modal-backdrop"></div>

    <div class="modal-content">
        <h2>学習を終了しますか？</h2>
        <p id="studyTimeText"></p>

        <div class="modal-buttons">
        <button id="confirmEnd" class="btn red">終了する</button>
        <button id="cancelEnd" class="btn green">続ける</button>
        </div>
    </div>
    </div>

    <div id="toast" class="toast hidden">
    <div class="toast-title">お疲れさまでした</div>
    <div id="toast-text" class="toast-text"></div>
    </div>

    <footer></footer>
    <script src="assets/js/study-room.js" type="module"></script>
</body>
</html>
